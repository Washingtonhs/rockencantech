<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rok Encantech | Produto</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4" href="index.html">
      <i class="bi bi-bag-heart-fill me-2"></i>Rok Encantech
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="index.html"><i class="bi bi-house me-1"></i>Início</a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-2" id="nav-auth-area"></div>
    </div>
  </div>
</nav>

<!-- Breadcrumb -->
<div class="bg-light border-bottom py-2">
  <div class="container">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0 small">
        <li class="breadcrumb-item"><a href="index.html">Início</a></li>
        <li class="breadcrumb-item" id="bc-category"></li>
        <li class="breadcrumb-item active" id="bc-product" aria-current="page"></li>
      </ol>
    </nav>
  </div>
</div>

<!-- Conteúdo -->
<div class="container my-5">

  <!-- Spinner -->
  <div id="loading-spinner" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">Carregando produto...</p>
  </div>

  <!-- Produto -->
  <div id="product-detail" class="d-none">
    <div class="row g-5">

      <!-- Imagem -->
      <div class="col-md-5">
        <div class="card border-0 shadow-sm overflow-hidden">
          <img id="product-image" src="" alt="" class="img-fluid w-100 product-detail-img" />
        </div>
      </div>

      <!-- Informações -->
      <div class="col-md-7">
        <span id="product-category-badge" class="badge bg-primary mb-2"></span>
        <h1 id="product-name" class="fw-bold"></h1>
        <div class="d-flex align-items-center gap-2 mb-3">
          <span class="text-warning">
            <i class="bi bi-star-fill"></i>
            <i class="bi bi-star-fill"></i>
            <i class="bi bi-star-fill"></i>
            <i class="bi bi-star-fill"></i>
            <i class="bi bi-star-half"></i>
          </span>
          <small class="text-muted">(avaliações)</small>
        </div>

        <h2 id="product-price" class="text-primary fw-bold fs-2 mb-3"></h2>

        <hr />

        <h6 class="fw-bold text-muted text-uppercase small mb-2">Descrição</h6>
        <p id="product-description" class="text-secondary"></p>

        <hr />

        <div class="d-flex gap-3 mt-4">
          <button class="btn btn-primary btn-lg px-5">
            <i class="bi bi-cart-plus me-2"></i>Adicionar ao Carrinho
          </button>
          <button class="btn btn-outline-secondary btn-lg">
            <i class="bi bi-heart"></i>
          </button>
        </div>

        <div class="mt-4 text-muted small">
          <i class="bi bi-truck me-1 text-success"></i> Frete grátis para todo o Brasil
          <br />
          <i class="bi bi-shield-check me-1 text-success"></i> Compra 100% segura
        </div>
      </div>
    </div>
  </div>

  <!-- Erro -->
  <div id="product-error" class="text-center py-5 d-none">
    <i class="bi bi-exclamation-circle display-4 text-danger"></i>
    <p class="mt-3 text-muted fs-5">Produto não encontrado.</p>
    <a href="index.html" class="btn btn-primary mt-2">Voltar para a loja</a>
  </div>

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-4 mt-auto">
  <p class="mb-0">&copy; 2025 Rok Encantech. Todos os direitos reservados.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/product-detail.js"></script>
</body>
</html>
