<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rok Encantech | Produtos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4" href="index.html">
      <i class="bi bi-bag-heart-fill me-2"></i>Rok Encantech
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link active" href="index.html"><i class="bi bi-house me-1"></i>Início</a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-2" id="nav-auth-area">
        <!-- Preenchido pelo JS -->
      </div>
    </div>
  </div>
</nav>

<!-- Hero -->
<div class="hero-banner bg-primary text-white py-5">
  <div class="container text-center">
    <h1 class="fw-bold display-5">Encontre o que você precisa</h1>
    <p class="lead mb-4">Milhares de produtos com os melhores preços</p>
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="input-group input-group-lg shadow">
          <input type="text" id="search-input" class="form-control" placeholder="Buscar produtos..." />
          <button class="btn btn-warning fw-bold" id="btn-search">
            <i class="bi bi-search"></i> Buscar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Conteúdo principal -->
<div class="container my-5">
  <div class="row">

    <!-- Sidebar categorias -->
    <div class="col-lg-3 mb-4">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-white fw-bold border-bottom">
          <i class="bi bi-grid me-2 text-primary"></i>Categorias
        </div>
        <div class="card-body p-0">
          <ul class="list-group list-group-flush" id="category-list">
            <li class="list-group-item list-group-action active-cat" data-id="" style="cursor:pointer">
              <i class="bi bi-collection me-2"></i>Todos os produtos
            </li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Lista de produtos -->
    <div class="col-lg-9">
      <!-- Barra de resultado -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <span id="result-info" class="text-muted small"></span>
        <select id="per-page-select" class="form-select form-select-sm w-auto">
          <option value="8">8 por página</option>
          <option value="16" selected>16 por página</option>
          <option value="32">32 por página</option>
        </select>
      </div>

      <!-- Spinner -->
      <div id="loading-spinner" class="text-center py-5 d-none">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Carregando produtos...</p>
      </div>

      <!-- Grid produtos -->
      <div id="products-grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4"></div>

      <!-- Sem resultados -->
      <div id="no-results" class="text-center py-5 d-none">
        <i class="bi bi-search display-4 text-muted"></i>
        <p class="mt-3 text-muted fs-5">Nenhum produto encontrado.</p>
      </div>

      <!-- Paginação -->
      <nav class="mt-4">
        <ul class="pagination justify-content-center" id="pagination"></ul>
      </nav>
    </div>

  </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-4 mt-auto">
  <p class="mb-0">&copy; 2025 Rok Encantech. Todos os direitos reservados.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/products.js"></script>
</body>
</html>
