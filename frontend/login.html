<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rok Encantech | Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-light">

<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="col-12 col-sm-8 col-md-5 col-lg-4">

    <div class="text-center mb-4">
      <a href="index.html" class="text-decoration-none">
        <i class="bi bi-bag-heart-fill text-primary" style="font-size:2.5rem"></i>
        <h3 class="fw-bold text-primary mt-1">Rok Encantech</h3>
      </a>
    </div>

    <div class="card shadow border-0 rounded-4">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-1">Bem-vindo de volta!</h5>
        <p class="text-muted small mb-4">Faça login para continuar</p>

        <!-- Alerta de erro -->
        <div id="login-alert" class="alert alert-danger d-none" role="alert"></div>

        <form id="login-form" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold small">E-mail</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
              <input type="email" class="form-control" id="email" placeholder="seu@email.com" required />
            </div>
            <div class="invalid-feedback">Informe um e-mail válido.</div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold small">Senha</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
              <input type="password" class="form-control" id="password" placeholder="Sua senha" required />
              <button class="btn btn-light border toggle-password" type="button" data-target="#password">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <div class="invalid-feedback">Informe sua senha.</div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="btn-login">
            <span class="spinner-border spinner-border-sm me-2 d-none" id="login-spinner"></span>
            Entrar
          </button>
        </form>

        <hr class="my-3" />

        <p class="text-center text-muted small mb-0">
          Não tem conta?
          <a href="register.html" class="text-primary fw-semibold text-decoration-none">Cadastre-se</a>
        </p>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/login.js"></script>
</body>
</html>
